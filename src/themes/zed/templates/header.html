<header class="site-header">
  <div class="container">
    <i class="znode bl" aria-hidden="true"></i><i class="znode br" aria-hidden="true"></i>
    <a class="brand" href="{{ OVERRIDDEN_SITEURL or SITEURL }}/">
      {% if GRAVATAR_URL %}<img class="avatar" src="{{ GRAVATAR_URL }}?s=64" alt="">{% endif %}
      <span>{{ FULL_AUTHOR_NAME or AUTHOR }}</span>
    </a>

    <nav class="nav">
      {% for section in SECTIONS %}
        <a href="{{ SITEURL }}/{{ section[1] }}">{{ section[0] }}</a>
      {% endfor %}
      {% for s in OTHER_SITES %}
        <a href="{{ OVERRIDDEN_SITEURL or SITEURL }}/{{ s[1] }}">{{ s[0] }}<span class="ext" aria-hidden="true">&#8599;</span></a>
      {% endfor %}
    </nav>

    <button class="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
      </svg>
    </button>

    <button class="menu-toggle" type="button" aria-label="Open navigation menu"
            aria-expanded="false" aria-controls="mobile-drawer" aria-haspopup="dialog">
      <svg class="i-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/>
      </svg>
      <svg class="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
</header>
